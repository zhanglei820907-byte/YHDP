<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>提交结果 - PHQ-9</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">
    <div class="card shadow-sm" style="max-width: 450px; width: 100%;">
        <div class="card-body text-center p-4">
            <h3 class="text-success mb-3">✅ 提交成功</h3>
            <div class="display-4 fw-bold text-primary my-3">{{ total_score }}</div>
            <p class="text-muted">您的得分</p>
            <div class="alert alert-info"><strong>风险等级：</strong>{{ risk_level }}</div>
            <div class="alert {% if valid_flag %}alert-success{% else %}alert-danger{% endif %}">
                <strong>数据有效性：</strong>{% if valid_flag %}有效{% else %}无效{% endif %}
            </div>
            <a href="/survey" class="btn btn-primary mt-2">返回问卷</a>
        </div>
    </div>
</body>
</html>
