<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if item %}编辑{% else %}新增{% endif %}知识条目</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; }
        .container { max-width: 700px; }
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 16px rgba(0,0,0,0.08); margin-top: 40px; }
        .card-header { background: #2ecc71; color: white; border-radius: 12px 12px 0 0; padding: 20px 24px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="card-header">
                <h4 class="mb-0">{% if item %}✏️ 编辑知识条目{% else %}➕ 新增知识条目{% endif %}</h4>
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-bold">标题 <span class="text-danger">*</span></label>
                        <input type="text" name="title" class="form-control" value="{{ item.title if item else '' }}" required>
                    </div>
                    <div class="row g-2 mb-3">
                        <div class="col-6">
                            <label class="form-label fw-bold">分类 <span class="text-danger">*</span></label>
                            <select name="category" class="form-select" required>
                                {% for c in categories %}
                                <option value="{{ c }}" {% if item and item.category == c %}selected{% endif %}>{{ c }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-6">
                            <label class="form-label fw-bold">标签</label>
                            <input type="text" name="tags" class="form-control" placeholder="逗号分隔，如: 新手,减脂,入门" value="{{ item.tags if item else '' }}">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">内容 <span class="text-danger">*</span></label>
                        <textarea name="content" class="form-control" rows="10" required placeholder="详细描述锻炼方法、注意事项等">{{ item.content if item else '' }}</textarea>
                    </div>
                    <div class="row g-2 mb-3">
                        <div class="col-6">
                            <label class="form-label">视频链接（可选）</label>
                            <input type="url" name="video_url" class="form-control" placeholder="https://..." value="{{ item.video_url if item else '' }}">
                        </div>
                        <div class="col-6">
                            <label class="form-label">图片链接（可选）</label>
                            <input type="url" name="image_url" class="form-control" placeholder="https://..." value="{{ item.image_url if item else '' }}">
                        </div>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-success">💾 保存</button>
                        <a href="/kb" class="btn btn-outline-secondary">取消</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
