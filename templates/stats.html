<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据统计</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5" style="max-width: 800px;">
        <h2 class="mb-4 text-center">问卷统计</h2>

        <h4 class="mb-3">PHQ-9 抑郁筛查</h4>
        <div class="row g-3 mb-4">
            <div class="col-3"><div class="card text-center shadow-sm"><div class="card-body py-3"><div class="fs-3 fw-bold text-primary">{{ total_count }}</div><div class="text-muted small">总提交数</div></div></div></div>
            <div class="col-3"><div class="card text-center shadow-sm"><div class="card-body py-3"><div class="fs-3 fw-bold text-success">{{ valid_count }}</div><div class="text-muted small">有效问卷</div></div></div></div>
            <div class="col-3"><div class="card text-center shadow-sm"><div class="card-body py-3"><div class="fs-3 fw-bold text-danger">{{ invalid_count }}</div><div class="text-muted small">无效问卷</div></div></div></div>
            <div class="col-3"><div class="card text-center shadow-sm"><div class="card-body py-3"><div class="fs-3 fw-bold text-info">{{ avg_score }}</div><div class="text-muted small">有效平均分</div></div></div></div>
        </div>

        <h4 class="mb-3">GAD-7 焦虑筛查</h4>
        <div class="row g-3 mb-4">
            <div class="col-3"><div class="card text-center shadow-sm"><div class="card-body py-3"><div class="fs-3 fw-bold text-primary">{{ gad7_total }}</div><div class="text-muted small">总提交数</div></div></div></div>
            <div class="col-3"><div class="card text-center shadow-sm"><div class="card-body py-3"><div class="fs-3 fw-bold text-success">{{ gad7_valid }}</div><div class="text-muted small">有效问卷</div></div></div></div>
            <div class="col-3"><div class="card text-center shadow-sm"><div class="card-body py-3"><div class="fs-3 fw-bold text-danger">{{ gad7_invalid }}</div><div class="text-muted small">无效问卷</div></div></div></div>
            <div class="col-3"><div class="card text-center shadow-sm"><div class="card-body py-3"><div class="fs-3 fw-bold text-info">{{ gad7_avg }}</div><div class="text-muted small">有效平均分</div></div></div></div>
        </div>

        <div class="text-center mt-4">
            <a href="/survey" class="btn btn-primary me-2">PHQ-9 问卷</a>
            <a href="/gad7_survey" class="btn btn-warning me-2">GAD-7 问卷</a>
            <a href="/export" class="btn btn-outline-secondary">导出 CSV</a>
        </div>
    </div>
</body>
</html>
