<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>提交结果 - 运动认知</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="min-height:100vh;">
    <div class="card shadow-sm" style="max-width: 520px; width: 100%;">
        <div class="card-body text-center p-4">
            <h3 class="text-success mb-3">✅ 提交成功</h3>
            <div class="display-4 fw-bold my-3" style="color: #8E44AD;">{{ total_score }}</div>
            <p class="text-muted">运动认知总分（满分 172）</p>
            <div class="row g-2 mb-2 text-start">
                <div class="col-6"><div class="p-2 rounded bg-light"><small class="text-muted">D1 益处认知</small><br><strong>{{ d1 }} / 72</strong></div></div>
                <div class="col-6"><div class="p-2 rounded bg-light"><small class="text-muted">D2 障碍认知</small><br><strong>{{ d2 }} / 48</strong></div></div>
                <div class="col-6"><div class="p-2 rounded bg-light"><small class="text-muted">D3 家庭氛围</small><br><strong>{{ d3 }} / 36</strong></div></div>
                <div class="col-6"><div class="p-2 rounded bg-light"><small class="text-muted">D4 自我效能</small><br><strong>{{ d4 }} / 16</strong></div></div>
            </div>
            <div class="alert alert-info"><strong>认知水平：</strong>{{ risk_level }}</div>
            <div class="alert {% if valid_flag %}alert-success{% else %}alert-danger{% endif %}"><strong>有效性：</strong>{% if valid_flag %}有效{% else %}无效（答题过快）{% endif %}</div>
            <div class="text-muted small mb-3"><strong>UID：</strong><code>{{ uid }}</code></div>
            <a href="/cognition_survey" class="btn mt-2" style="background: #8E44AD; color: white;">返回问卷</a>
        </div>
    </div>
</body>
</html>
