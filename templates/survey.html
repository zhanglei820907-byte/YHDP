<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHQ-9 抑郁筛查问卷</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f5f5f5; padding-bottom: 40px; }
        .container { max-width: 800px; }
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 16px rgba(0,0,0,0.08); margin-top: 20px; }
        .card-header { background: #4a6cf7; color: white; border-radius: 12px 12px 0 0; padding: 24px; }
        .card-body { padding: 28px; }
        .q-block { background: #f8f9fa; border-radius: 8px; padding: 16px 20px; margin-bottom: 14px; }
        .q-block p { font-weight: 600; margin-bottom: 10px; }
        .btn-check:checked+.btn-outline-secondary { background: #4a6cf7; border-color: #4a6cf7; color: white; }
        .btn-submit { width: 100%; padding: 12px; font-size: 1.1rem; font-weight: 600; border-radius: 8px; margin-top: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="card-header">
                <h3 class="mb-1">PHQ-9 抑郁筛查问卷</h3>
                <p class="mb-0 opacity-75">请根据过去两周内的实际情况，如实回答以下问题</p>
            </div>
            <div class="card-body">
                <form action="/submit" method="POST">
                    <input type="hidden" name="start_time" id="start_time">
                    <div class="row mb-4">
                        <div class="col-sm-6 mb-3 mb-sm-0">
                            <label for="student_id" class="form-label fw-bold">学号 <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="student_id" name="student_id" required>
                        </div>
                        <div class="col-sm-6">
                            <label for="student_name" class="form-label fw-bold">姓名 <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="student_name" name="student_name" required>
                        </div>
                    </div>
                    <div class="q-block">
                        <p>1. 做事时提不起劲或没有兴趣</p>
                        <div class="btn-group flex-wrap gap-1" role="group">
                            <input type="radio" class="btn-check" name="q1" id="q1_0" value="0" required>
                            <label class="btn btn-outline-secondary" for="q1_0">完全不会</label>
                            <input type="radio" class="btn-check" name="q1" id="q1_1" value="1">
                            <label class="btn btn-outline-secondary" for="q1_1">几天</label>
                            <input type="radio" class="btn-check" name="q1" id="q1_2" value="2">
                            <label class="btn btn-outline-secondary" for="q1_2">一半以上天数</label>
                            <input type="radio" class="btn-check" name="q1" id="q1_3" value="3">
                            <label class="btn btn-outline-secondary" for="q1_3">几乎每天</label>
                        </div>
                    </div>
                    <div class="q-block">
                        <p>2. 感到心情低落、沮丧或绝望</p>
                        <div class="btn-group flex-wrap gap-1" role="group">
                            <input type="radio" class="btn-check" name="q2" id="q2_0" value="0" required>
                            <label class="btn btn-outline-secondary" for="q2_0">完全不会</label>
                            <input type="radio" class="btn-check" name="q2" id="q2_1" value="1">
                            <label class="btn btn-outline-secondary" for="q2_1">几天</label>
                            <input type="radio" class="btn-check" name="q2" id="q2_2" value="2">
                            <label class="btn btn-outline-secondary" for="q2_2">一半以上天数</label>
                            <input type="radio" class="btn-check" name="q2" id="q2_3" value="3">
                            <label class="btn btn-outline-secondary" for="q2_3">几乎每天</label>
                        </div>
                    </div>
                    <div class="q-block">
                        <p>3. 入睡困难、睡不安稳或睡眠过多</p>
                        <div class="btn-group flex-wrap gap-1" role="group">
                            <input type="radio" class="btn-check" name="q3" id="q3_0" value="0" required>
                            <label class="btn btn-outline-secondary" for="q3_0">完全不会</label>
                            <input type="radio" class="btn-check" name="q3" id="q3_1" value="1">
                            <label class="btn btn-outline-secondary" for="q3_1">几天</label>
                            <input type="radio" class="btn-check" name="q3" id="q3_2" value="2">
                            <label class="btn btn-outline-secondary" for="q3_2">一半以上天数</label>
                            <input type="radio" class="btn-check" name="q3" id="q3_3" value="3">
                            <label class="btn btn-outline-secondary" for="q3_3">几乎每天</label>
                        </div>
                    </div>
                    <div class="q-block">
                        <p>4. 感到疲倦或没有活力</p>
                        <div class="btn-group flex-wrap gap-1" role="group">
                            <input type="radio" class="btn-check" name="q4" id="q4_0" value="0" required>
                            <label class="btn btn-outline-secondary" for="q4_0">完全不会</label>
                            <input type="radio" class="btn-check" name="q4" id="q4_1" value="1">
                            <label class="btn btn-outline-secondary" for="q4_1">几天</label>
                            <input type="radio" class="btn-check" name="q4" id="q4_2" value="2">
                            <label class="btn btn-outline-secondary" for="q4_2">一半以上天数</label>
                            <input type="radio" class="btn-check" name="q4" id="q4_3" value="3">
                            <label class="btn btn-outline-secondary" for="q4_3">几乎每天</label>
                        </div>
                    </div>
                    <div class="q-block">
                        <p>5. 食欲不振或吃太多</p>
                        <div class="btn-group flex-wrap gap-1" role="group">
                            <input type="radio" class="btn-check" name="q5" id="q5_0" value="0" required>
                            <label class="btn btn-outline-secondary" for="q5_0">完全不会</label>
                            <input type="radio" class="btn-check" name="q5" id="q5_1" value="1">
                            <label class="btn btn-outline-secondary" for="q5_1">几天</label>
                            <input type="radio" class="btn-check" name="q5" id="q5_2" value="2">
                            <label class="btn btn-outline-secondary" for="q5_2">一半以上天数</label>
                            <input type="radio" class="btn-check" name="q5" id="q5_3" value="3">
                            <label class="btn btn-outline-secondary" for="q5_3">几乎每天</label>
                        </div>
                    </div>
                    <div class="q-block">
                        <p>6. 觉得自己很糟或觉得自己很失败，或让自己或家人失望</p>
                        <div class="btn-group flex-wrap gap-1" role="group">
                            <input type="radio" class="btn-check" name="q6" id="q6_0" value="0" required>
                            <label class="btn btn-outline-secondary" for="q6_0">完全不会</label>
                            <input type="radio" class="btn-check" name="q6" id="q6_1" value="1">
                            <label class="btn btn-outline-secondary" for="q6_1">几天</label>
                            <input type="radio" class="btn-check" name="q6" id="q6_2" value="2">
                            <label class="btn btn-outline-secondary" for="q6_2">一半以上天数</label>
                            <input type="radio" class="btn-check" name="q6" id="q6_3" value="3">
                            <label class="btn btn-outline-secondary" for="q6_3">几乎每天</label>
                        </div>
                    </div>
                    <div class="q-block">
                        <p>7. 对事物专注有困难，例如阅读报纸或看电视时</p>
                        <div class="btn-group flex-wrap gap-1" role="group">
                            <input type="radio" class="btn-check" name="q7" id="q7_0" value="0" required>
                            <label class="btn btn-outline-secondary" for="q7_0">完全不会</label>
                            <input type="radio" class="btn-check" name="q7" id="q7_1" value="1">
                            <label class="btn btn-outline-secondary" for="q7_1">几天</label>
                            <input type="radio" class="btn-check" name="q7" id="q7_2" value="2">
                            <label class="btn btn-outline-secondary" for="q7_2">一半以上天数</label>
                            <input type="radio" class="btn-check" name="q7" id="q7_3" value="3">
                            <label class="btn btn-outline-secondary" for="q7_3">几乎每天</label>
                        </div>
                    </div>
                    <div class="q-block">
                        <p>8. 动作或说话速度缓慢到别人已经察觉？或正好相反——烦躁或坐立不安、动来动去的情况更胜于平常</p>
                        <div class="btn-group flex-wrap gap-1" role="group">
                            <input type="radio" class="btn-check" name="q8" id="q8_0" value="0" required>
                            <label class="btn btn-outline-secondary" for="q8_0">完全不会</label>
                            <input type="radio" class="btn-check" name="q8" id="q8_1" value="1">
                            <label class="btn btn-outline-secondary" for="q8_1">几天</label>
                            <input type="radio" class="btn-check" name="q8" id="q8_2" value="2">
                            <label class="btn btn-outline-secondary" for="q8_2">一半以上天数</label>
                            <input type="radio" class="btn-check" name="q8" id="q8_3" value="3">
                            <label class="btn btn-outline-secondary" for="q8_3">几乎每天</label>
                        </div>
                    </div>
                    <div class="q-block">
                        <p>9. 有不如死掉或用某种方式伤害自己的念头</p>
                        <div class="btn-group flex-wrap gap-1" role="group">
                            <input type="radio" class="btn-check" name="q9" id="q9_0" value="0" required>
                            <label class="btn btn-outline-secondary" for="q9_0">完全不会</label>
                            <input type="radio" class="btn-check" name="q9" id="q9_1" value="1">
                            <label class="btn btn-outline-secondary" for="q9_1">几天</label>
                            <input type="radio" class="btn-check" name="q9" id="q9_2" value="2">
                            <label class="btn btn-outline-secondary" for="q9_2">一半以上天数</label>
                            <input type="radio" class="btn-check" name="q9" id="q9_3" value="3">
                            <label class="btn btn-outline-secondary" for="q9_3">几乎每天</label>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary btn-submit">提交问卷</button>
                </form>
            </div>
        </div>
    </div>
    <script>
        document.getElementById('start_time').value = new Date().toISOString();
    </script>
</body>
</html>
