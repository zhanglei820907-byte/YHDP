<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>体格测试 - 教师端录入</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; padding-bottom: 40px; }
        .container { max-width: 860px; }
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 16px rgba(0,0,0,0.08); margin-top: 20px; }
        .card-header { background: #2C3E50; color: white; border-radius: 12px 12px 0 0; padding: 20px 24px; }
        .card-body { padding: 24px 28px; }
        .section-title { font-size: 1rem; font-weight: 700; color: #2C3E50; margin: 20px 0 12px; padding-bottom: 6px; border-bottom: 2px solid #e0e0e0; }
        .btn-submit { width: 100%; padding: 12px; font-size: 1.1rem; font-weight: 600; border-radius: 8px; margin-top: 16px; background: #2C3E50; border-color: #2C3E50; color: white; }
        .btn-submit:hover { background: #1a252f; border-color: #1a252f; }
        .btn-search { background: #2C3E50; border-color: #2C3E50; color: white; }
        .btn-search:hover { background: #1a252f; border-color: #1a252f; color: white; }
        .form-label { font-weight: 600; font-size: 0.9rem; margin-bottom: 2px; }
        .form-text { font-size: 0.75rem; }
        #search_result { min-height: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="card-header">
                <h4 class="mb-1">🏋️ 体格测试数据录入</h4>
                <p class="mb-0 opacity-75">教师端体测数据录入，请先检索学生学号</p>
            </div>
            <div class="card-body">
                <form action="/physical_submit" method="POST" id="main_form">
                    <!-- 检索区 -->
                    <div class="row g-2 align-items-end mb-3 p-3 bg-light rounded">
                        <div class="col-sm-5">
                            <label for="search_student_id" class="form-label">检索学号</label>
                            <input type="text" class="form-control" id="search_student_id" placeholder="输入学号">
                        </div>
                        <div class="col-sm-3">
                            <button type="button" class="btn btn-search w-100" onclick="searchStudent()">🔍 检索</button>
                        </div>
                        <div class="col-sm-4">
                            <div id="search_result"></div>
                        </div>
                    </div>

                    <!-- 隐藏的学号/姓名字段 -->
                    <input type="hidden" name="student_id" id="student_id">
                    <input type="hidden" name="student_name" id="student_name">

                    <!-- 握力区 -->
                    <div class="section-title">💪 握力测试 (kg)</div>
                    <div class="row g-2">
                        <div class="col-md-6">
                            <label class="form-label">左手握力</label>
                            <div class="input-group input-group-sm mb-1">
                                <span class="input-group-text">第1次</span>
                                <input type="number" step="0.1" class="form-control" name="grip_left_1" placeholder="kg">
                            </div>
                            <div class="input-group input-group-sm mb-1">
                                <span class="input-group-text">第2次</span>
                                <input type="number" step="0.1" class="form-control" name="grip_left_2" placeholder="kg">
                            </div>
                            <div class="input-group input-group-sm">
                                <span class="input-group-text">第3次</span>
                                <input type="number" step="0.1" class="form-control" name="grip_left_3" placeholder="kg">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">右手握力</label>
                            <div class="input-group input-group-sm mb-1">
                                <span class="input-group-text">第1次</span>
                                <input type="number" step="0.1" class="form-control" name="grip_right_1" placeholder="kg">
                            </div>
                            <div class="input-group input-group-sm mb-1">
                                <span class="input-group-text">第2次</span>
                                <input type="number" step="0.1" class="form-control" name="grip_right_2" placeholder="kg">
                            </div>
                            <div class="input-group input-group-sm">
                                <span class="input-group-text">第3次</span>
                                <input type="number" step="0.1" class="form-control" name="grip_right_3" placeholder="kg">
                            </div>
                        </div>
                    </div>
                    <div class="mt-2">
                        <label class="form-label">优势手</label>
                        <select class="form-select form-select-sm" name="grip_dominant" style="max-width:200px;">
                            <option value="">请选择</option>
                            <option value="1">左手</option>
                            <option value="2">右手</option>
                        </select>
                    </div>

                    <!-- 腰围区 -->
                    <div class="section-title">📏 腰围</div>
                    <div class="input-group input-group-sm" style="max-width:300px;">
                        <input type="number" step="0.1" class="form-control" name="waist_circ" placeholder="腰围">
                        <span class="input-group-text">cm</span>
                    </div>

                    <!-- 体脂称区 -->
                    <div class="section-title">⚖️ 体脂称数据</div>
                    <div class="row g-2">
                        <div class="col-6 col-sm-4">
                            <label class="form-label">体重 (kg)</label>
                            <input type="number" step="0.1" class="form-control form-control-sm" name="weight">
                        </div>
                        <div class="col-6 col-sm-4">
                            <label class="form-label">BMI</label>
                            <input type="number" step="0.1" class="form-control form-control-sm" name="bmi">
                        </div>
                        <div class="col-6 col-sm-4">
                            <label class="form-label">体脂率 (%)</label>
                            <input type="number" step="0.1" class="form-control form-control-sm" name="body_fat_rate">
                        </div>
                        <div class="col-6 col-sm-4">
                            <label class="form-label">体脂量 (kg)</label>
                            <input type="number" step="0.1" class="form-control form-control-sm" name="body_fat_mass">
                        </div>
                        <div class="col-6 col-sm-4">
                            <label class="form-label">肌肉量 (kg)</label>
                            <input type="number" step="0.1" class="form-control form-control-sm" name="muscle_mass">
                        </div>
                        <div class="col-6 col-sm-4">
                            <label class="form-label">骨骼肌 (kg)</label>
                            <input type="number" step="0.1" class="form-control form-control-sm" name="skeletal_muscle">
                        </div>
                        <div class="col-6 col-sm-4">
                            <label class="form-label">骨量 (kg)</label>
                            <input type="number" step="0.1" class="form-control form-control-sm" name="bone_mass">
                        </div>
                        <div class="col-6 col-sm-4">
                            <label class="form-label">体水分率 (%)</label>
                            <input type="number" step="0.1" class="form-control form-control-sm" name="body_water_rate">
                        </div>
                        <div class="col-6 col-sm-4">
                            <label class="form-label">体水分量 (kg)</label>
                            <input type="number" step="0.1" class="form-control form-control-sm" name="body_water_mass">
                        </div>
                        <div class="col-6 col-sm-4">
                            <label class="form-label">蛋白质率 (%)</label>
                            <input type="number" step="0.1" class="form-control form-control-sm" name="protein_rate">
                        </div>
                        <div class="col-6 col-sm-4">
                            <label class="form-label">蛋白质量 (kg)</label>
                            <input type="number" step="0.1" class="form-control form-control-sm" name="protein_mass">
                        </div>
                        <div class="col-6 col-sm-4">
                            <label class="form-label">基础代谢 (kcal)</label>
                            <input type="number" step="0.1" class="form-control form-control-sm" name="bmr">
                        </div>
                        <div class="col-6 col-sm-4">
                            <label class="form-label">内脏脂肪等级</label>
                            <input type="number" class="form-control form-control-sm" name="visceral_fat">
                        </div>
                        <div class="col-6 col-sm-4">
                            <label class="form-label">皮下脂肪率 (%)</label>
                            <input type="number" step="0.1" class="form-control form-control-sm" name="subcut_fat_rate">
                        </div>
                        <div class="col-6 col-sm-3">
                            <label class="form-label">身体年龄</label>
                            <input type="number" class="form-control form-control-sm" name="body_age">
                        </div>
                        <div class="col-6 col-sm-3">
                            <label class="form-label">身体类型</label>
                            <select class="form-select form-select-sm" name="body_type">
                                <option value="">请选择</option>
                                <option value="1">偏瘦</option>
                                <option value="2">标准</option>
                                <option value="3">偏胖</option>
                                <option value="4">肥胖</option>
                            </select>
                        </div>
                        <div class="col-6 col-sm-3">
                            <label class="form-label">心率 (bpm)</label>
                            <input type="number" class="form-control form-control-sm" name="heart_rate">
                        </div>
                        <div class="col-6 col-sm-3">
                            <label class="form-label">身体评分</label>
                            <input type="number" class="form-control form-control-sm" name="body_score">
                        </div>
                    </div>

                    <!-- 公共区 -->
                    <div class="section-title">📋 测量信息</div>
                    <div class="row g-2">
                        <div class="col-sm-4">
                            <label class="form-label">测量日期</label>
                            <input type="date" class="form-control form-control-sm" name="measure_date" id="measure_date">
                        </div>
                        <div class="col-sm-4">
                            <label class="form-label">测量人员</label>
                            <input type="text" class="form-control form-control-sm" name="measure_operator" placeholder="姓名">
                        </div>
                        <div class="col-sm-4">
                            <label class="form-label">数据备注</label>
                            <input type="text" class="form-control form-control-sm" name="data_quality_note" placeholder="如有异常请注明">
                        </div>
                    </div>

                    <button type="submit" class="btn btn-submit">💾 保存体测数据</button>
                </form>
            </div>
        </div>
    </div>
    <script>
        // 默认今天日期
        document.getElementById('measure_date').value = new Date().toISOString().split('T')[0];

        async function searchStudent() {
            const sid = document.getElementById('search_student_id').value.trim();
            const resultDiv = document.getElementById('search_result');
            if (!sid) {
                resultDiv.innerHTML = '<div class="alert alert-warning py-1 px-2 small">请输入学号</div>';
                return;
            }
            resultDiv.innerHTML = '<div class="spinner-border spinner-border-sm text-secondary"></div>';
            try {
                const resp = await fetch('/physical_search', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                    body: 'student_id=' + encodeURIComponent(sid)
                });
                const html = await resp.text();
                resultDiv.innerHTML = html;
                // 自动填充隐藏字段
                const nameEl = document.getElementById('found_student_name');
                const uidEl = document.getElementById('found_uid');
                if (nameEl) {
                    document.getElementById('student_id').value = sid;
                    document.getElementById('student_name').value = nameEl.value;
                }
            } catch(e) {
                resultDiv.innerHTML = '<div class="alert alert-danger py-1 px-2 small">检索失败</div>';
            }
        }
    </script>
</body>
</html>
