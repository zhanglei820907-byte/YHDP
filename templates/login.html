<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学生健康档案 - 登录</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; }
        .login-card { max-width: 440px; width: 100%; margin: auto; border: none; border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.18); }
        .card-body { padding: 36px 32px; }
        .login-card h3 { font-weight: 700; color: #333; }
        .btn-login { width: 100%; padding: 12px; font-weight: 600; border-radius: 8px; background: #667eea; border: none; color: white; }
        .btn-login:hover { background: #5a6fd6; }
        .disclaimer { font-size: 0.78rem; color: #aaa; margin-top: 16px; text-align: center; }
    </style>
</head>
<body>
    <div class="login-card card">
        <div class="card-body">
            <div class="text-center mb-3">
                <span style="font-size:2.8rem;">🏥</span>
                <h3 class="mt-2">学生健康档案</h3>
                <p class="text-muted small">请输入学号和出生日期查看您的个人健康数据</p>
            </div>

            {% if error %}
            <div class="alert alert-danger py-2 small">{{ error }}</div>
            {% endif %}

            <form method="POST">
                <div class="mb-3">
                    <label class="form-label fw-bold small">学号</label>
                    <input type="text" name="student_id" class="form-control" placeholder="请输入学号" required autofocus>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold small">出生日期</label>
                    <input type="date" name="birth_date" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-login">🔍 查看我的健康档案</button>
            </form>

            <p class="disclaimer mt-3">
                ⚠️ 本系统仅用于健康管理与学术研究。<br>
                您的个人信息受严格保护，不会泄露给第三方。<br>
                数据仅供参考，不能替代专业医疗诊断。
            </p>
        </div>
    </div>
</body>
</html>
